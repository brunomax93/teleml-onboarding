<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TELEML — Corretor de NF-e</title>

<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">

<style>
:root {
    --azul-m:#1565c0; --azul-c:#29b6f6;
    --verde:#1D9E75; --vermelho:#ff6b6b;
    --bg:#080f24; --card:rgba(255,255,255,0.04);
    --borda:rgba(41,182,246,0.15);
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'DM Sans';background:var(--bg);color:#fff;}
.header{background:#0d1f4e;padding:15px;}
.main{max-width:700px;margin:auto;padding:40px 20px;}
.card{background:var(--card);border:1px solid var(--borda);border-radius:16px;padding:25px;margin-bottom:20px;}
.input-field{width:100%;padding:12px;margin-bottom:15px;border-radius:10px;background:#111;border:1px solid #333;color:#fff;}
.btn{width:100%;padding:14px;border:none;border-radius:12px;font-weight:bold;cursor:pointer;margin-top:10px;}
.btn-primary{background:linear-gradient(135deg,#1565c0,#29b6f6);}
.btn-success{background:#1D9E75;}
.btn-outline{background:none;border:1px solid #555;color:#aaa;}
.secao{display:none;}
.secao.ativa{display:block;}
.dado-row{display:flex;justify-content:space-between;margin-bottom:10px;}
.log{background:#000;padding:10px;margin-top:10px;font-size:12px;color:#888;white-space:pre-wrap;}
</style>
</head>

<body>

<div class="header"><b>TELEML — Corretor de NF-e</b></div>

<div class="main">

<div class="secao ativa" id="step1">
<div class="card">
<h3>Configuração</h3><br>
<input id="token" class="input-field" placeholder="Access Token">
<input id="order" class="input-field" placeholder="Order ID">
<button class="btn btn-primary" onclick="proximo(2)">Continuar</button>
</div>
</div>

<div class="secao" id="step2">
<div class="card">
<h3>Upload XML</h3><br>
<input type="file" accept=".xml" onchange="lerXml(this)">
<div id="preview"></div><br>
<button class="btn btn-primary" onclick="buscar()">Buscar valor no ML</button>
<button class="btn btn-outline" onclick="proximo(1)">Voltar</button>
</div>
</div>

<div class="secao" id="step3">
<div class="card">
<h3>Conferência</h3><br>

<div class="dado-row">
<span>XML:</span>
<span id="vxml"></span>
</div>

<div class="dado-row">
<span>ML:</span>
<span id="vml"></span>
</div>

<button class="btn btn-primary" onclick="corrigir()">Corrigir XML</button>
<button class="btn btn-success" onclick="baixar()">Baixar XML</button>
<button class="btn btn-primary" onclick="proximo(4)">Ir para envio</button>

</div>
</div>

<div class="secao" id="step4">
<div class="card">
<h3>Enviar</h3><br>
<button class="btn btn-success" onclick="enviar()">ENVIAR NF</button>
<div class="log" id="log">Aguardando...</div>
<button class="btn btn-outline" onclick="location.reload()">Recomeçar</button>
</div>
</div>

</div>

<script>

const URL = "https://script.google.com/macros/s/AKfycbxrErjqzyIERF_5ETigcPuQ9-C3EXbKUko7swvWH9w05TgHMhWHSnH4gYq_ZqLuEV5i2A/exec";

let app = { xml:"", xmlCorr:"", vXml:0, vMl:0, nome:"" };

function proximo(n){
    document.querySelectorAll(".secao").forEach(s=>s.classList.remove("ativa"));
    document.getElementById("step"+n).classList.add("ativa");
}

function lerXml(input){
    const f = input.files[0];
    if(!f) return;

    app.nome = f.name;

    const reader = new FileReader();
    reader.onload = e=>{
        app.xml = e.target.result;

        const doc = new DOMParser().parseFromString(app.xml,"text/xml");
        const vNF = doc.getElementsByTagName("vNF")[0];

        app.vXml = vNF ? parseFloat(vNF.textContent) : 0;

        document.getElementById("preview").innerHTML =
            "Arquivo: "+f.name+" | Valor: R$ "+app.vXml.toFixed(2);
    };
    reader.readAsText(f);
}

async function buscar(){
    try{
        const res = await fetch(URL,{
            method:"POST",
            body:JSON.stringify({
                action:"buscar_pedido",
                token:document.getElementById("token").value,
                order_id:document.getElementById("order").value
            })
        });

        const text = await res.text();
        console.log("RESPOSTA:", text);

        const data = JSON.parse(text);

        if(data.error){
            alert("Erro: "+data.message);
            return;
        }

        app.vMl = data.total_amount;

        document.getElementById("vxml").innerText = "R$ "+app.vXml.toFixed(2);
        document.getElementById("vml").innerText = "R$ "+app.vMl.toFixed(2);

        proximo(3);

    }catch(e){
        alert("Erro geral: "+e.message);
        console.error(e);
    }
}

function corrigir(){
    const parser = new DOMParser();
    const xmlDoc = parser.parseFromString(app.xml,"text/xml");

    ["vProd","vNF","vPag"].forEach(tag=>{
        const el = xmlDoc.getElementsByTagName(tag);
        for(let i=0;i<el.length;i++){
            el[i].textContent = app.vMl.toFixed(2);
        }
    });

    app.xmlCorr = new XMLSerializer().serializeToString(xmlDoc);

    alert("XML corrigido com sucesso!");
}

function baixar(){
    const blob = new Blob([app.xmlCorr], {type:"text/xml"});
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "corrigido.xml";
    a.click();
}

async function enviar(){
    const log = document.getElementById("log");

    try{
        const b64 = btoa(unescape(encodeURIComponent(app.xmlCorr)));

        const res = await fetch(URL,{
            method:"POST",
            body:JSON.stringify({
                action:"enviar_nfe",
                token:document.getElementById("token").value,
                order_id:document.getElementById("order").value,
                xml_base64:b64,
                nome_arquivo:app.nome
            })
        });

        const text = await res.text();
        console.log("ENVIO:", text);

        log.innerText = text;

    }catch(e){
        log.innerText = "ERRO: " + e.message;
    }
}

</script>

</body>
</html>
