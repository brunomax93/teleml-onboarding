<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TELEML — Corretor de NF-e</title>

<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">

<style>
:root {
    --azul-m: #1565c0; --azul-c: #29b6f6;
    --verde: #1D9E75; --vermelho: #ff6b6b;
    --bg: #080f24; --card: rgba(255,255,255,0.04);
    --borda: rgba(41,182,246,0.15);
}
*{margin:0;padding:0;box-sizing:border-box;}
body{
    font-family:'DM Sans', sans-serif;
    background:var(--bg);
    color:#fff;
}
.header{
    background:rgba(13,31,78,0.95);
    padding:15px 25px;
}
.main{max-width:700px;margin:auto;padding:40px 20px;}
.card{
    background:var(--card);
    border:1px solid var(--borda);
    border-radius:16px;
    padding:25px;
    margin-bottom:20px;
}
.input-field{
    width:100%;
    padding:12px;
    margin-bottom:15px;
    border-radius:10px;
    background:rgba(255,255,255,0.05);
    border:1px solid rgba(255,255,255,0.1);
    color:#fff;
}
.btn{
    width:100%;
    padding:14px;
    border:none;
    border-radius:12px;
    cursor:pointer;
    font-weight:bold;
}
.btn-primary{background:linear-gradient(135deg,#1565c0,#29b6f6);}
.btn-success{background:#1D9E75;}
.btn-outline{background:none;border:1px solid #555;color:#aaa;}

.secao{display:none;}
.secao.ativa{display:block;}

.dado-row{
    display:flex;
    justify-content:space-between;
    margin-bottom:10px;
}
.log{
    background:#000;
    padding:10px;
    margin-top:10px;
    font-size:12px;
    color:#888;
}
</style>
</head>

<body>

<div class="header">
    <b>TELEML — Corretor de NF-e</b>
</div>

<div class="main">

<!-- STEP 1 -->
<div class="secao ativa" id="step1">
<div class="card">
<h3>Configuração</h3><br>

<input id="token" class="input-field" placeholder="Access Token">
<input id="order" class="input-field" placeholder="Order ID">

<button class="btn btn-primary" onclick="proximo(2)">Continuar</button>
</div>
</div>

<!-- STEP 2 -->
<div class="secao" id="step2">
<div class="card">
<h3>Upload XML</h3><br>

<input type="file" id="file" accept=".xml" onchange="lerXml(this)">

<div id="preview"></div><br>

<button id="btnFetch" class="btn btn-primary" onclick="buscar()">Buscar valor no ML</button>

<button class="btn btn-outline" onclick="proximo(1)">Voltar</button>
</div>
</div>

<!-- STEP 3 -->
<div class="secao" id="step3">
<div class="card">

<h3>Conferência</h3><br>

<div class="dado-row">
<span>XML:</span>
<span id="vxml"></span>
</div>

<div class="dado-row">
<span>ML:</span>
<span id="vml"></span>
</div>

<br>

<button class="btn btn-primary" onclick="corrigir()">Corrigir XML</button>

<button class="btn btn-success" onclick="baixar()">Baixar XML</button>

<button class="btn btn-primary" onclick="proximo(4)">Ir para envio</button>

</div>
</div>

<!-- STEP 4 -->
<div class="secao" id="step4">
<div class="card">

<h3>Enviar</h3><br>

<button class="btn btn-success" onclick="enviar()">ENVIAR NF</button>

<div class="log" id="log"></div>

<button class="btn btn-outline" onclick="location.reload()">Recomeçar</button>

</div>
</div>

</div>

<script>

const URL = "COLE_AQUI_SUA_WEBAPP";

let app = {
    xml:"",
    xmlCorr:"",
    vXml:0,
    vMl:0,
    nome:""
};

function proximo(n){
    document.querySelectorAll(".secao").forEach(s=>s.classList.remove("ativa"));
    document.getElementById("step"+n).classList.add("ativa");
}

function lerXml(input){
    const f = input.files[0];
    app.nome = f.name;

    const reader = new FileReader();
    reader.onload = e=>{
        app.xml = e.target.result;

        const doc = new DOMParser().parseFromString(app.xml,"text/xml");
        const vNF = doc.getElementsByTagName("vNF")[0];

        app.vXml = vNF ? parseFloat(vNF.textContent) : 0;

        document.getElementById("preview").innerHTML =
            "Arquivo: "+f.name+" | Valor: R$ "+app.vXml.toFixed(2);
    };
    reader.readAsText(f);
}

async function buscar(){
    const res = await fetch(URL,{
        method:"POST",
        body:JSON.stringify({
            action:"buscar_pedido",
            token:document.getElementById("token").value,
            order_id:document.getElementById("order").value
        })
    });

    const data = await res.json();

    app.vMl = data.total_amount;

    document.getElementById("vxml").innerText = "R$ "+app.vXml.toFixed(2);
    document.getElementById("vml").innerText = "R$ "+app.vMl.toFixed(2);

    proximo(3);
}

function corrigir(){
    const parser = new DOMParser();
    const xmlDoc = parser.parseFromString(app.xml,"text/xml");

    const tags = ["vProd","vNF","vPag"];

    tags.forEach(tag=>{
        const el = xmlDoc.getElementsByTagName(tag);
        for(let i=0;i<el.length;i++){
            el[i].textContent = app.vMl.toFixed(2);
        }
    });

    const serializer = new XMLSerializer();
    app.xmlCorr = serializer.serializeToString(xmlDoc);

    alert("XML corrigido!");
}

function baixar(){
    const blob = new Blob([app.xmlCorr], {type:"text/xml"});
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "corrigido.xml";
    a.click();
}

async function enviar(){

    const log = document.getElementById("log");

    const b64 = btoa(unescape(encodeURIComponent(app.xmlCorr)));

    const res = await fetch(URL,{
        method:"POST",
        body:JSON.stringify({
            action:"enviar_nfe",
            token:document.getElementById("token").value,
            order_id:document.getElementById("order").value,
            xml_base64:b64,
            nome_arquivo:app.nome
        })
    });

    const data = await res.json();

    log.innerText = JSON.stringify(data,null,2);
}

</script>

</body>
</html>
