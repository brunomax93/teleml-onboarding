<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TELEML — Corretor de NF-e</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --azul-m: #1565c0; --azul-c: #29b6f6; --verde: #1D9E75; --vermelho: #ff6b6b;
            --bg: #080f24; --card: rgba(255,255,255,0.04); --borda: rgba(41,182,246,0.15);
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'DM Sans', sans-serif; background:var(--bg); color:#fff; min-height:100vh; }
        .header { background:rgba(13,31,78,0.95); border-bottom:1px solid var(--borda); padding:15px 25px; }
        .header-logo { font-family:'Syne', sans-serif; font-size:1.2rem; font-weight:800; }
        .header-logo span { color:#f5c518; }
        .main { max-width:700px; margin:0 auto; padding:40px 20px; }
        .card { background:var(--card); border:1px solid var(--borda); border-radius:16px; padding:25px; margin-bottom:20px; }
        .input-field { width:100%; background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.1); border-radius:10px; padding:12px; color:#fff; margin-bottom:15px; outline:none; }
        .btn { width:100%; padding:14px; border-radius:12px; border:none; font-family:'Syne', sans-serif; font-size:0.9rem; font-weight:700; cursor:pointer; margin-bottom:10px; transition: 0.2s; text-decoration:none; display:block; text-align:center; }
        .btn-primary { background:linear-gradient(135deg,var(--azul-m),var(--azul-c)); color:#fff; }
        .btn-success { background:var(--verde); color:#fff; }
        .btn-outline { background:transparent; border:1px solid var(--borda); color:#aaa; }
        .info-box { background:rgba(41,182,246,0.1); border:1px solid var(--azul-c); border-radius:10px; padding:15px; margin:15px 0; font-size:0.85rem; color:#ade8ff; }
        .secao { display:none; }
        .secao.ativa { display:block; }
        .log-box { font-family:monospace; font-size:0.75rem; background:#000; padding:12px; border-radius:8px; margin-top:10px; max-height:150px; overflow-y:auto; color:#888; border: 1px solid #1a1a2e; }
    </style>
</head>
<body>

<div class="header"><div class="header-logo">TELE<span>ML</span> — Corretor</div></div>

<div class="main">
    <div class="secao ativa" id="step1">
        <div class="card">
            <h3>🔑 Configuração</h3><br>
            <input type="password" id="token" class="input-field" placeholder="Access Token (APP_USR-...)">
            <input type="text" id="order" class="input-field" placeholder="ID da Venda (Order ID)">
            <button class="btn btn-primary" onclick="irPara(2)">Próximo Passo →</button>
        </div>
    </div>

    <div class="secao" id="step2">
        <div class="card">
            <h3>📄 Upload do XML</h3><br>
            <input type="file" id="fileInput" accept=".xml" onchange="processarXml(this)" style="margin-bottom:20px">
            <div id="preview" class="info-box" style="display:none"></div>
            <button class="btn btn-primary" id="btn-fetch" onclick="buscarValor()" disabled>🔍 Buscar Valor Real no ML</button>
            <button class="btn btn-outline" onclick="irPara(1)">Voltar</button>
        </div>
    </div>

    <div class="secao" id="step3">
        <div class="card">
            <h3>✏️ Conferência</h3><br>
            <p>Valor Original: <span id="v-xml" style="color:var(--vermelho)">—</span></p>
            <p>Valor Real ML: <span id="v-ml" style="color:var(--verde)">—</span></p><br>
            <button class="btn btn-primary" onclick="corrigir()">✏️ Corrigir XML</button>
            <div id="bloco-pos" style="display:none">
                <button class="btn btn-success" onclick="baixar()">⬇️ BAIXAR XML AGORA</button>
                <button class="btn btn-primary" onclick="irPara(4)">Ir para o Envio →</button>
            </div>
            <button class="btn btn-outline" onclick="irPara(2)">Voltar</button>
        </div>
    </div>

    <div class="secao" id="step4">
        <div class="card">
            <h3>🚀 Envio Final</h3><br>
            <button class="btn btn-success" id="btn-enviar" onclick="enviar()">🚀 ENVIAR PARA O ML</button>
            <button class="btn btn-outline" onclick="baixar()">⬇️ Baixar XML novamente</button>
            <div class="log-box" id="log-final">Aguardando...</div>
            <button class="btn btn-outline" onclick="location.reload()" style="margin-top:20px">Reiniciar</button>
        </div>
    </div>
</div>

<script>
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxrErjqzyIERF_5ETigcPuQ9-C3EXbKUko7swvWH9w05TgHMhWHSnH4gYq_ZqLuEV5i2A/exec'; 
    
    let db = { token: '', order: '', xml: '', xmlCorr: '', vXml: 0, vMl: 0, nome: '', packId: '' };

    function irPara(n) {
        document.querySelectorAll('.secao').forEach(s => s.classList.remove('ativa'));
        document.getElementById('step' + n).classList.add('ativa');
        if(n===1) { db.token = document.getElementById('token').value; db.order = document.getElementById('order').value; }
    }

    function processarXml(input) {
        const f = input.files[0]; if(!f) return;
        db.nome = f.name;
        const r = new FileReader();
        r.onload = e => {
            db.xml = e.target.result;
            const doc = new DOMParser().parseFromString(db.xml, "text/xml");
            db.vXml = parseFloat(doc.querySelector('vNF')?.textContent || 0);
            document.getElementById('preview').style.display = 'block';
            document.getElementById('preview').textContent = `Arquivo: ${f.name} (R$ ${db.vXml.toFixed(2)})`;
            document.getElementById('btn-fetch').disabled = false;
        };
        r.readAsText(f);
    }

    async function buscarValor() {
        try {
            const res = await fetch(SCRIPT_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'text/plain' },
                body: JSON.stringify({ action: 'buscar_pedido', token: db.token, order_id: db.order })
            });
            const data = await res.json();
            db.vMl = data.total_amount;
            db.packId = data.pack_id || data.id;
            document.getElementById('v-xml').textContent = "R$ " + db.vXml.toFixed(2);
            document.getElementById('v-ml').textContent = "R$ " + db.vMl.toFixed(2);
            irPara(3);
        } catch(e) { alert("Erro de conexão!"); }
    }

    function corrigir() {
        let txt = db.xml;
        const vA = db.vXml.toFixed(2);
        const vN = db.vMl.toFixed(2);
        ['vProd','vUnCom','vUnTrib','vNF','vPag'].forEach(t => {
            const re = new RegExp('<' + t + '>' + vA.replace('.', '\\.') + '</' + t + '>', 'g');
            txt = txt.replace(re, '<' + t + '>' + vN + '</' + t + '>');
        });
        db.xmlCorr = txt;
        document.getElementById('bloco-pos').style.display = 'block';
    }

    function baixar() {
        const blob = new Blob([db.xmlCorr], {type: 'text/xml'});
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = "CORRIGIDO_" + db.nome;
        a.click();
    }

    async function enviar() {
        const log = document.getElementById('log-final');
        log.textContent = "Enviando...";
        try {
            const b64 = btoa(unescape(encodeURIComponent(db.xmlCorr)));
            const res = await fetch(SCRIPT_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'text/plain' },
                body: JSON.stringify({ action: 'enviar_nfe', token: db.token, pack_id: db.packId, xml_base64: b64, nome_arquivo: db.nome })
            });
            const result = await res.json();
            if(result.error) throw new Error(result.message);
            log.style.color = "#1D9E75"; log.textContent = "✅ Enviado com sucesso!";
        } catch(e) { log.style.color = "#ff6b6b"; log.textContent = "❌ Erro: " + e.message; }
    }
</script>
</body>
</html>
