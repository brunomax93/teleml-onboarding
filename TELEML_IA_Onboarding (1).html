<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TELEML — Assistente de Onboarding</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --azul: #0d1f4e;
  --azul-m: #1565c0;
  --azul-c: #29b6f6;
  --amarelo: #f5c518;
  --amarelo-s: #fff8dc;
  --branco: #ffffff;
  --cinza: #f0f4f8;
  --texto: #1a1a2e;
  --texto-s: #4a5568;
  --sombra: 0 4px 24px rgba(13,31,78,0.13);
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: 'DM Sans', sans-serif;
  background: #080f24;
  min-height: 100vh;
  overflow-x: hidden;
}

/* ── PARTÍCULAS ── */
.particles { position:fixed; inset:0; pointer-events:none; z-index:0; overflow:hidden; }
.particle {
  position:absolute; border-radius:50%;
  animation: float linear infinite;
  opacity:0.15;
}
@keyframes float {
  0%   { transform: translateY(100vh) rotate(0deg); opacity:0; }
  10%  { opacity:0.15; }
  90%  { opacity:0.15; }
  100% { transform: translateY(-100px) rotate(720deg); opacity:0; }
}

/* ── LOGIN ── */
#login-screen {
  position:fixed; inset:0; z-index:100;
  display:flex; align-items:center; justify-content:center;
  background: radial-gradient(ellipse at 30% 40%, rgba(21,101,192,0.2) 0%, transparent 60%),
              radial-gradient(ellipse at 70% 70%, rgba(245,197,24,0.08) 0%, transparent 50%),
              #080f24;
}
.login-card {
  background: rgba(255,255,255,0.04);
  backdrop-filter: blur(20px);
  border: 1px solid rgba(41,182,246,0.2);
  border-radius: 24px;
  padding: 48px 44px;
  width: 100%; max-width: 420px;
  text-align: center;
  box-shadow: 0 24px 80px rgba(0,0,0,0.5);
  animation: slideUp 0.6s cubic-bezier(0.16,1,0.3,1);
}
@keyframes slideUp {
  from { transform: translateY(40px); opacity:0; }
  to   { transform: translateY(0); opacity:1; }
}
.login-logo {
  width: 90px; height: 90px;
  border-radius: 50%;
  border: 3px solid rgba(41,182,246,0.4);
  margin: 0 auto 20px;
  box-shadow: 0 0 32px rgba(41,182,246,0.3);
}
.login-card h1 {
  font-family: 'Syne', sans-serif;
  font-size: 1.7rem; font-weight: 800;
  color: #fff; margin-bottom: 4px;
}
.login-card h1 span { color: var(--amarelo); }
.login-card p { font-size: 0.85rem; color: rgba(165,210,255,0.6); margin-bottom: 32px; }
.login-input-wrap { position:relative; margin-bottom:16px; }
.login-input-wrap input {
  width:100%; padding: 14px 18px 14px 46px;
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(41,182,246,0.2);
  border-radius: 12px;
  color: white; font-size: 0.95rem;
  font-family: 'DM Sans', sans-serif;
  transition: border-color 0.2s, background 0.2s;
  outline: none;
}
.login-input-wrap input:focus {
  border-color: var(--azul-c);
  background: rgba(41,182,246,0.08);
}
.login-input-wrap .icon {
  position:absolute; left:14px; top:50%; transform:translateY(-50%);
  font-size:1.1rem; opacity:0.5;
}
.login-btn {
  width:100%; padding: 14px;
  background: linear-gradient(135deg, var(--azul-m), var(--azul-c));
  border: none; border-radius: 12px;
  color: white; font-size: 1rem; font-weight: 600;
  font-family: 'Syne', sans-serif;
  cursor: pointer; letter-spacing: 0.5px;
  transition: transform 0.2s, box-shadow 0.2s;
  margin-top: 8px;
}
.login-btn:hover { transform:translateY(-2px); box-shadow: 0 8px 24px rgba(41,182,246,0.3); }
.login-error {
  color: #ff6b6b; font-size:0.82rem;
  margin-top: 10px; display:none;
  animation: shake 0.4s;
}
@keyframes shake {
  0%,100%{transform:translateX(0)} 25%{transform:translateX(-8px)} 75%{transform:translateX(8px)}
}

/* ── APP PRINCIPAL ── */
#app { display:none; min-height:100vh; flex-direction:column; position:relative; z-index:1; }

/* ── TOPBAR ── */
.topbar {
  background: rgba(13,31,78,0.95);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid rgba(41,182,246,0.15);
  padding: 12px 24px;
  display: flex; align-items:center; gap:14px;
  position: sticky; top:0; z-index:50;
}
.topbar img { width:42px; height:42px; border-radius:50%; border:2px solid rgba(41,182,246,0.4); }
.topbar-info h2 { font-family:'Syne',sans-serif; font-size:1rem; font-weight:700; color:#fff; }
.topbar-info p  { font-size:0.73rem; color: var(--azul-c); }
.topbar-status {
  margin-left:auto; display:flex; align-items:center; gap:7px;
  font-size:0.78rem; color: rgba(165,210,255,0.7);
}
.status-dot {
  width:8px;height:8px;border-radius:50%;
  background:var(--azul-c);
  box-shadow:0 0 8px var(--azul-c);
  animation: pulse 2s infinite;
}
@keyframes pulse { 0%,100%{opacity:1}50%{opacity:0.4} }
.topbar-logout {
  background:rgba(255,255,255,0.06); border:1px solid rgba(255,255,255,0.1);
  color:rgba(255,255,255,0.5); padding:6px 14px; border-radius:8px;
  font-size:0.78rem; cursor:pointer; margin-left:12px;
  transition:all 0.2s;
}
.topbar-logout:hover { background:rgba(255,80,80,0.15); color:#ff6b6b; border-color:rgba(255,80,80,0.3); }

/* ── PROGRESS ── */
.progress-bar {
  background: rgba(13,31,78,0.8);
  border-bottom: 1px solid rgba(41,182,246,0.1);
  padding: 10px 24px;
  display:flex; gap:6px; align-items:center; overflow-x:auto;
}
.step-dot {
  width:28px;height:28px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:0.7rem;font-weight:700;
  border:2px solid rgba(255,255,255,0.1);
  color:rgba(255,255,255,0.3);
  flex-shrink:0; transition:all 0.3s; cursor:default;
  font-family:'Syne',sans-serif;
}
.step-dot.done   { background:var(--azul-c); border-color:var(--azul-c); color:#fff; }
.step-dot.active { background:var(--amarelo); border-color:var(--amarelo); color:var(--azul); box-shadow:0 0 12px rgba(245,197,24,0.4); }
.step-line { flex:1; height:2px; background:rgba(255,255,255,0.08); min-width:12px; flex-shrink:0; transition:background 0.3s; }
.step-line.done { background:var(--azul-c); }

/* ── CHAT ── */
.chat-area {
  flex:1; overflow-y:auto; padding:24px;
  display:flex;flex-direction:column;gap:16px;
  max-width:800px;width:100%;margin:0 auto;
}
.bubble-wrap { display:flex; gap:10px; animation:fadeIn 0.4s ease; }
@keyframes fadeIn { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
.bubble-wrap.user { flex-direction:row-reverse; }

.avatar {
  width:36px;height:36px;border-radius:50%;
  flex-shrink:0;display:flex;align-items:center;justify-content:center;
  font-size:1rem;border:2px solid rgba(41,182,246,0.3);
  background:rgba(13,31,78,0.8);
}
.bubble-wrap.user .avatar {
  background:rgba(245,197,24,0.15);border-color:rgba(245,197,24,0.4);
}

.bubble {
  max-width:75%;padding:14px 18px;border-radius:18px;
  font-size:0.9rem;line-height:1.6;
}
.bubble.bot {
  background:rgba(255,255,255,0.06);
  border:1px solid rgba(41,182,246,0.15);
  color:rgba(255,255,255,0.9);
  border-radius:4px 18px 18px 18px;
}
.bubble.user {
  background:linear-gradient(135deg, var(--azul-m), var(--azul));
  color:#fff;border-radius:18px 4px 18px 18px;
  border:1px solid rgba(41,182,246,0.2);
}
.bubble h3 {
  font-family:'Syne',sans-serif;font-size:0.85rem;
  color:var(--amarelo);margin-bottom:8px;font-weight:700;
}
.bubble code {
  background:rgba(0,0,0,0.3);border-radius:6px;
  padding:8px 12px;display:block;margin:8px 0;
  font-size:0.78rem;color:var(--azul-c);
  font-family:'Courier New',monospace;
  word-break:break-all;border-left:3px solid var(--azul-c);
  line-height:1.5;
}
.bubble .prompt-box {
  background:rgba(245,197,24,0.08);
  border:1px solid rgba(245,197,24,0.3);
  border-left:3px solid var(--amarelo);
  border-radius:8px;padding:10px 14px;margin:10px 0;
  font-size:0.83rem;color:rgba(255,255,255,0.85);
  white-space:pre-line;font-style:italic;
}
.bubble .prompt-label {
  font-family:'Syne',sans-serif;font-size:0.72rem;font-weight:700;
  color:var(--amarelo);text-transform:uppercase;letter-spacing:1px;
  margin-bottom:6px;font-style:normal;display:block;
}
.bubble .step-badge {
  display:inline-block;background:var(--amarelo);color:var(--azul);
  font-family:'Syne',sans-serif;font-size:0.7rem;font-weight:800;
  padding:2px 10px;border-radius:20px;margin-bottom:8px;
}
.bubble ul { padding-left:18px;margin:6px 0; }
.bubble ul li { margin-bottom:4px;color:rgba(255,255,255,0.8); }
.bubble strong { color:#fff; }
.bubble .warning {
  background:rgba(245,197,24,0.1);border:1px solid rgba(245,197,24,0.3);
  border-radius:8px;padding:8px 12px;margin:8px 0;
  font-size:0.83rem;color:rgba(255,220,100,0.9);
}

/* ── TYPING ── */
.typing { display:flex;gap:5px;align-items:center;padding:10px 14px; }
.typing span {
  width:7px;height:7px;border-radius:50%;
  background:var(--azul-c);opacity:0.4;
  animation:typing 1.2s infinite;
}
.typing span:nth-child(2){animation-delay:0.2s}
.typing span:nth-child(3){animation-delay:0.4s}
@keyframes typing{0%,60%,100%{opacity:0.4;transform:scale(1)}30%{opacity:1;transform:scale(1.2)}}

/* ── INPUT AREA ── */
.input-area {
  background:rgba(13,31,78,0.95);backdrop-filter:blur(12px);
  border-top:1px solid rgba(41,182,246,0.15);
  padding:16px 24px;
}
.input-inner { max-width:800px;margin:0 auto;display:flex;gap:12px;align-items:flex-end; }
.input-box {
  flex:1;background:rgba(255,255,255,0.06);
  border:1px solid rgba(41,182,246,0.2);border-radius:14px;
  padding:12px 16px;color:white;font-size:0.9rem;
  font-family:'DM Sans',sans-serif;resize:none;outline:none;
  max-height:120px;transition:border-color 0.2s;
  min-height:46px;
}
.input-box:focus { border-color:var(--azul-c); }
.input-box::placeholder { color:rgba(255,255,255,0.3); }
.send-btn {
  width:46px;height:46px;border-radius:12px;
  background:linear-gradient(135deg,var(--azul-m),var(--azul-c));
  border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;
  flex-shrink:0;transition:transform 0.2s,box-shadow 0.2s;
}
.send-btn:hover { transform:translateY(-2px);box-shadow:0 6px 20px rgba(41,182,246,0.3); }
.send-btn svg { width:20px;height:20px;fill:white; }

/* ── QUICK REPLIES ── */
.quick-replies {
  max-width:800px;margin:0 auto 12px;
  display:flex;flex-wrap:wrap;gap:8px;
}
.qr-btn {
  background:rgba(255,255,255,0.06);
  border:1px solid rgba(41,182,246,0.2);
  border-radius:20px;padding:7px 16px;
  color:rgba(255,255,255,0.8);font-size:0.82rem;
  cursor:pointer;transition:all 0.2s;
  font-family:'DM Sans',sans-serif;
}
.qr-btn:hover { background:rgba(41,182,246,0.15);border-color:var(--azul-c);color:#fff; }

/* ── CODE OUTPUT ── */
.code-output {
  background:#0d1224;border:1px solid rgba(41,182,246,0.2);
  border-radius:12px;margin:8px 0;overflow:hidden;
}
.code-output-header {
  background:rgba(41,182,246,0.1);padding:8px 14px;
  display:flex;align-items:center;justify-content:space-between;
}
.code-output-header span { font-size:0.75rem;color:var(--azul-c);font-family:'Syne',sans-serif;font-weight:700; }
.copy-btn {
  background:rgba(245,197,24,0.15);border:1px solid rgba(245,197,24,0.3);
  color:var(--amarelo);padding:4px 12px;border-radius:6px;
  font-size:0.72rem;cursor:pointer;transition:all 0.2s;
  font-family:'DM Sans',sans-serif;
}
.copy-btn:hover { background:rgba(245,197,24,0.25); }
.code-output pre {
  padding:14px;font-family:'Courier New',monospace;
  font-size:0.76rem;color:#a8d8f0;line-height:1.5;
  overflow-x:auto;max-height:300px;white-space:pre-wrap;word-break:break-all;
}
</style>
</head>

<script>
// ── CREDENCIAIS ──────────────────────────────────────────
const USERS = {
  'teleml': 'grupofa2024',
  'admin':  'teleml@2024',
  'equipe': 'onboarding123'
};

// ── ESTADO ──────────────────────────────────────────────
let state = {
  step: 0,
  clientName: '',
  refreshToken: '',
  sellerId: '',
  botToken: '',
  chatId: '',
  waitingFor: null
};

// ── PARTÍCULAS ──────────────────────────────────────────
function createParticles() {
  const container = document.getElementById('particles');
  const colors = ['#29b6f6','#f5c518','#1565c0'];
  for(let i=0;i<18;i++){
    const p = document.createElement('div');
    p.className = 'particle';
    const size = Math.random()*6+3;
    p.style.cssText = `
      width:${size}px;height:${size}px;
      left:${Math.random()*100}%;
      background:${colors[Math.floor(Math.random()*colors.length)]};
      animation-duration:${Math.random()*20+15}s;
      animation-delay:${Math.random()*15}s;
    `;
    container.appendChild(p);
  }
}

// ── LOGIN ────────────────────────────────────────────────
function doLogin() {
  const user = document.getElementById('login-user').value.trim().toLowerCase();
  const pass = document.getElementById('login-pass').value.trim();
  const err  = document.getElementById('login-error');

  if(USERS[user] && USERS[user] === pass) {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app').style.display = 'flex';
    startChat();
  } else {
    err.style.display = 'block';
    setTimeout(()=>err.style.display='none', 3000);
  }
}

function doLogout() {
  if(confirm('Deseja sair?')) location.reload();
}

// ── PROGRESS BAR ─────────────────────────────────────────
const STEPS = ['Nome','ML Auth','Token','Telegram','Código','Custos','Vendas','Gatilhos','Teste'];
function renderProgress() {
  const bar = document.getElementById('progress-bar');
  bar.innerHTML = '';
  STEPS.forEach((s,i) => {
    const dot = document.createElement('div');
    dot.className = 'step-dot' + (i < state.step ? ' done' : i === state.step ? ' active' : '');
    dot.title = s;
    dot.textContent = i+1;
    bar.appendChild(dot);
    if(i < STEPS.length-1) {
      const line = document.createElement('div');
      line.className = 'step-line' + (i < state.step ? ' done' : '');
      bar.appendChild(line);
    }
  });
}

// ── CHAT ─────────────────────────────────────────────────
function addBubble(html, isUser=false) {
  const chat = document.getElementById('chat');
  const wrap = document.createElement('div');
  wrap.className = 'bubble-wrap' + (isUser ? ' user' : '');
  const emo = isUser ? '👤' : '🤖';
  wrap.innerHTML = `
    <div class="avatar">${emo}</div>
    <div class="bubble ${isUser?'user':'bot'}">${html}</div>
  `;
  chat.appendChild(wrap);
  chat.scrollTop = chat.scrollHeight;
  return wrap;
}

function showTyping() {
  const chat = document.getElementById('chat');
  const wrap = document.createElement('div');
  wrap.className = 'bubble-wrap';
  wrap.id = 'typing-indicator';
  wrap.innerHTML = `
    <div class="avatar">🤖</div>
    <div class="bubble bot"><div class="typing"><span></span><span></span><span></span></div></div>
  `;
  chat.appendChild(wrap);
  chat.scrollTop = chat.scrollHeight;
}

function removeTyping() {
  const t = document.getElementById('typing-indicator');
  if(t) t.remove();
}

function setQuickReplies(options) {
  const qr = document.getElementById('quick-replies');
  qr.innerHTML = '';
  options.forEach(opt => {
    const btn = document.createElement('button');
    btn.className = 'qr-btn';
    btn.textContent = opt;
    btn.onclick = () => { sendMsg(opt); };
    qr.appendChild(btn);
  });
}

function clearQuickReplies() {
  document.getElementById('quick-replies').innerHTML = '';
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

// ── ENVIAR MENSAGEM ───────────────────────────────────────
function sendMsg(override) {
  const input = document.getElementById('user-input');
  const text = override || input.value.trim();
  if(!text) return;
  if(!override) input.value = '';
  input.style.height = '46px';
  clearQuickReplies();
  addBubble(text.replace(/\n/g,'<br>'), true);
  setTimeout(() => processInput(text), 600);
}

// ── FLUXO PRINCIPAL ───────────────────────────────────────
function startChat() {
  createParticles();
  renderProgress();
  setTimeout(() => {
    showTyping();
    setTimeout(() => {
      removeTyping();
      addBubble(`
        <div class="step-badge">👋 BEM-VINDO</div>
        <h3>Assistente TELEML de Onboarding</h3>
        Olá! Sou o assistente que vai te guiar no cadastro de um novo cliente no sistema TELEML.<br><br>
        Vou solicitar as informações necessárias em cada etapa e <strong>gerar o código automaticamente</strong> para você colar no Apps Script.<br><br>
        Para começar, qual é o <strong>nome do cliente</strong>?
      `);
      state.waitingFor = 'clientName';
    }, 1200);
  }, 400);
}

function processInput(text) {
  showTyping();
  setTimeout(() => {
    removeTyping();
    handleStep(text);
  }, 900);
}

function handleStep(text) {
  const t = text.trim();

  // ── STEP 0: NOME DO CLIENTE ──
  if(state.waitingFor === 'clientName') {
    state.clientName = t.toUpperCase();
    state.step = 1;
    renderProgress();
    addBubble(`
      <div class="step-badge">✅ PASSO 1 — PLANILHA</div>
      Perfeito! Cliente: <strong>${state.clientName}</strong><br><br>
      <h3>Criar a Planilha</h3>
      <ul>
        <li>Acesse o Google Docs logado em <strong>bruno.max.93@gmail.com</strong></li>
        <li>Baixe o modelo pelo link abaixo e faça o upload:</li>
      </ul>
      <code>https://docs.google.com/spreadsheets/d/1DQxg0Y96gVpPxhYW33ZUxK0csjkTKyQB/export?format=xlsx</code>
      <ul>
        <li>Renomeie para: <strong>TELEML ${state.clientName}</strong></li>
        <li>Abra o Apps Script: <strong>Extensões → Apps Script</strong></li>
        <li>Renomeie o projeto para: <strong>TELEML ${state.clientName}</strong></li>
      </ul>
      Quando terminar, clique em <strong>Pronto!</strong>
    `);
    setQuickReplies(['✅ Pronto!']);
    state.waitingFor = 'step1done';
    return;
  }

  // ── STEP 1: AUTORIZAR ML ──
  if(state.waitingFor === 'step1done') {
    state.step = 2;
    renderProgress();
    addBubble(`
      <div class="step-badge">✅ PASSO 2 — AUTORIZAÇÃO ML</div>
      <h3>Autorizar o Mercado Livre</h3>
      Envie este link para o cliente clicar em <strong>Autorizar</strong>:
      <code>https://auth.mercadolivre.com.br/authorization?response_type=code&client_id=3747048518453843&redirect_uri=https://script.google.com/macros/s/AKfycbzXb4XKSv7m-vaBG0yFtoieppzKSOyr_GC5ICftvH9jxuhUIiOCnPifCXDZgNZjV6Ca/exec</code>
      <div class="warning">⚠️ Após clicar, vai aparecer uma tela de erro — isso é normal! Peça para o cliente copiar a URL completa dessa tela e te enviar.</div>
      Cole aqui a URL que o cliente te enviou:
    `);
    state.waitingFor = 'mlUrl';
    return;
  }

  // ── STEP 2: PROCESSAR URL ML ──
  if(state.waitingFor === 'mlUrl') {
    const codeMatch = t.match(/code=(TG-[^&\s]+)/);
    if(!codeMatch) {
      addBubble('❌ Não consegui encontrar o código na URL. Verifique se copiou a URL completa e tente novamente.');
      return;
    }
    const code = codeMatch[1];
    state.step = 3;
    renderProgress();
    addBubble(`
      <div class="step-badge">✅ PASSO 3 — GERAR TOKEN</div>
      <h3>Código capturado!</h3>
      Código ML: <strong>${code}</strong><br><br>
      Cole o código abaixo no Apps Script (<strong>substitua TUDO</strong>) e execute <strong>gerarTokenDoCliente</strong>:
      <div class="code-output">
        <div class="code-output-header">
          <span>📄 Código.gs — Etapa inicial</span>
          <button class="copy-btn" onclick="copyCode('code-init')">Copiar</button>
        </div>

function escHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function copyCode(id) {
  const el = document.getElementById(id);
  navigator.clipboard.writeText(el.textContent).then(() => {
    const btn = el.closest('.code-output').querySelector('.copy-btn');
    btn.textContent = '✅ Copiado!';
    setTimeout(()=>btn.textContent='Copiar',2000);
  });
}

// --- 1. RECEBER RESPOSTA DO TELEGRAM (WEBHOOK) ---
function doPost(e) {
  if (!e || !e.postData) return;
  const dados = JSON.parse(e.postData.contents);
  let msgTexto = "";
  if (dados.message && dados.message.text) {
    msgTexto = dados.message.text;
  } else if (dados.callback_query) {
    msgTexto = dados.callback_query.data;
  }
  let comandoLimpo = msgTexto.replace(/@\S+/, "").trim();
  if (comandoLimpo.indexOf("/resp") === 0) {
    const partes = comandoLimpo.split(/\s+/);
    const idPergunta = partes[1];
    const respostaTexto = partes.slice(2).join(" ");
    if (!idPergunta || !respostaTexto) {
      enviarTelegram("❌ Erro: Digite a resposta após o número do ID.");
      return;
    }
    const token = getAccessToken();
    const url = "https://api.mercadolibre.com/answers";
    const options = {
      method: "post",
      headers: { Authorization: "Bearer " + token, "Content-Type": "application/json" },
      payload: JSON.stringify({ question_id: Number(idPergunta), text: String(respostaTexto) }),
      muteHttpExceptions: true
    };
    const resp = UrlFetchApp.fetch(url, options);
    const code = resp.getResponseCode();
    const respostaMeli = JSON.parse(resp.getContentText());
    if (code === 200 || code === 201) {
      enviarTelegram(\`✅ RESPOSTA ENVIADA!\nID: \${idPergunta}\nTexto: \${respostaTexto}\`);
    } else {
      enviarTelegram(\`⚠️ ERRO NO ML (\${code}): \${respostaMeli.message || "Erro de permissão"}\`);
    }
  }
}

// --- 3. MONITOR DE VENDAS ---
function buscarVendasDoMes() {
  const token = getAccessToken();
  const hoje = new Date();
  const hojeAno = hoje.getFullYear(), hojeMes = hoje.getMonth(), hojeDia = hoje.getDate();
  const inicio = new Date(hojeAno, hojeMes, 1);
  const fmt = d => d.toISOString().split("T")[0] + "T00:00:00.000-03:00";
  const ss = SpreadsheetApp.getActiveSpreadsheet();
  const abaVendas = ss.getSheetByName("Vendas");
  const abaCustos = ss.getSheetByName("Custos");
  const dadosExistentes = abaVendas.getDataRange().getValues();
  const pedidosJaRegistrados = new Set();
  for (let i = 1; i < dadosExistentes.length; i++) {
    let idLimpo = String(dadosExistentes[i][1]).replace(/[^0-9]/g, "");
    if (idLimpo) pedidosJaRegistrados.add(idLimpo);
  }
  const dadosCustos = abaCustos.getDataRange().getValues();
  const mapaCusto = {};
  for (let i = 1; i < dadosCustos.length; i++) {
    const chave = String(dadosCustos[i][0]).trim().toUpperCase();
    mapaCusto[chave] = parseFloat(String(dadosCustos[i][1]).replace(",", ".")) || 0;
  }
  let offset = 0, limit = 50, todosPedidos = [];
  while (true) {
    const url = \`https://api.mercadolibre.com/orders/search?seller=\${SELLER_ID}&order.date_created.from=\${fmt(inicio)}&order.status=paid&limit=\${limit}&offset=\${offset}\`;
    const resp = UrlFetchApp.fetch(url, { headers: { Authorization: \`Bearer \${token}\` } });
    const dados = JSON.parse(resp.getContentText());
    if (!dados.results || dados.results.length === 0) break;
    todosPedidos = todosPedidos.concat(dados.results);
    if (dados.results.length < limit) break;
    offset += limit;
    Utilities.sleep(500);
  }
  const novasVendasParaNotificar = [];
  for (const pedido of todosPedidos) {
    const pedidoId = String(pedido.id);
    if (pedidosJaRegistrados.has(pedidoId)) continue;
    let tipoLogistica = "PLACES", freteCalc = 0, dataDespachoTexto = "A definir", dataDespachoObj = null;
    if (pedido.shipping && pedido.shipping.id) {
      try {
        const respShip = UrlFetchApp.fetch(\`https://api.mercadolibre.com/shipments/\${pedido.shipping.id}\`, { headers: { Authorization: \`Bearer \${token}\` } });
        const ship = JSON.parse(respShip.getContentText());
        if (ship.logistic_type === "self_service") {
          tipoLogistica = "FLEX";
          freteCalc = pedido.order_items.some(it => it.unit_price < 79) ? -8.90 : -0.89;
          const payBefore = ship.shipping_option?.estimated_delivery_time?.pay_before || ship.shipping_option?.estimated_delivery_final?.date;
          if (payBefore) { dataDespachoObj = new Date(payBefore); dataDespachoTexto = Utilities.formatDate(dataDespachoObj, "GMT-3", "dd/MM/yyyy"); }
        } else {
          freteCalc = Math.max(0, (ship.shipping_option?.list_cost || 0) - (ship.shipping_option?.cost || 0));
          const bufferingDate = ship.shipping_option?.buffering?.date || ship.shipping_option?.estimated_delivery_final?.date;
          if (bufferingDate) { dataDespachoObj = new Date(bufferingDate); dataDespachoObj.setDate(dataDespachoObj.getDate() + 1); dataDespachoTexto = Utilities.formatDate(dataDespachoObj, "GMT-3", "dd/MM/yyyy"); }
        }
      } catch(e) {}
    }
    const totalItens = pedido.order_items.reduce((acc, curr) => acc + curr.quantity, 0);
    for (const item of pedido.order_items) {
      const sku = String(item.item.seller_sku || "SEM_SKU").trim().toUpperCase();
      const titulo = item.item.title || "";
      const preco = item.unit_price || 0, qtd = item.quantity || 1, taxaML = item.sale_fee || 0;
      const freteItem = (freteCalc / totalItens) * qtd;
      const custoUnit = buscarCusto(mapaCusto, sku, titulo);
      const imposto = (preco * qtd) * getAliquotaDecimal();
      const lucro = (preco * qtd) - (custoUnit * qtd) - taxaML - freteItem - imposto;
      const mgVenda = (preco * qtd) > 0 ? (lucro / (preco * qtd)) * 100 : 0;
      const mgCusto = (custoUnit * qtd) > 0 ? (lucro / (custoUnit * qtd)) * 100 : 0;
      abaVendas.appendRow([new Date(pedido.date_created), "", tipoLogistica, sku, titulo, qtd, preco, custoUnit, taxaML, freteItem, lucro, mgVenda.toFixed(1) + "%", dataDespachoObj, imposto.toFixed(2)]);
      const ultimaFila = abaVendas.getLastRow();
      const cellLink = abaVendas.getRange(ultimaFila, 2);
      cellLink.setFormula(\`=HYPERLINK("https://www.mercadolivre.com.br/vendas/\${pedidoId}/detalhe"; "\${pedidoId}")\`);
      cellLink.setFontColor("#1155cc").setFontLine("underline");
      if (dataDespachoObj) abaVendas.getRange(ultimaFila, 13).setNumberFormat("dd/mm/yyyy");
      novasVendasParaNotificar.push({ id: pedidoId, titulo, sku, preco: preco * qtd, lucro, mgVenda, mgCusto, tipoLogistica, despacho: dataDespachoTexto, imposto, frete: freteItem });
    }
  }
  const dadosFinais = abaVendas.getDataRange().getValues();
  let lucroHoje = 0, lucroMes = 0, brutoHoje = 0, brutoMes = 0;
  for (let i = 1; i < dadosFinais.length; i++) {
    const d = dadosFinais[i][0], preco = parseFloat(dadosFinais[i][6]) || 0, qtd = parseFloat(dadosFinais[i][5]) || 0, l = parseFloat(dadosFinais[i][10]) || 0;
    if (d instanceof Date && d.getFullYear() === hojeAno && d.getMonth() === hojeMes) {
      lucroMes += l; brutoMes += (preco * qtd);
      if (d.getDate() === hojeDia) { lucroHoje += l; brutoHoje += (preco * qtd); }
    }
  }
  const f = (v) => v.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
  for (const v of novasVendasParaNotificar) {
    const linkVenda = \`[\${v.id}](https://www.mercadolivre.com.br/vendas/\${v.id}/detalhe)\`;
    const iconeVenda = v.lucro < 0 ? "🚨" : "🛒", iconeLucro = v.lucro < 0 ? "❌" : "✅";
    const alertaExtra = v.lucro < 0 ? "\n⚠️ *ATENÇÃO! VENDA COM PREJUÍZO!* ⚠️" : "";
    const infoFrete = v.tipoLogistica === "FLEX" ? \`🎁 *Bônus envio:* \${f(Math.abs(v.frete))}\` : \`🚚 *Frete:* \${f(v.frete)}\`;
    const msg = \`\${iconeVenda} *Nova Venda!*\${alertaExtra}\n🆔 *Pedido:* \${linkVenda}\n📦 *Prod:* \${v.titulo.substring(0,40)}\n🏷️ *SKU:* \${v.sku}\n💵 *Venda:* \${f(v.preco)}\n🚚 *Envio:* \${v.tipoLogistica} | 🕒 *Até:* \${v.despacho}\n\${infoFrete}\n📝 *Imposto:* \${f(v.imposto)}\n\n\${iconeLucro} *Lucro:* \${f(v.lucro)}\n📊 *Margem:* \${v.mgVenda.toFixed(1)}% | *MKP:* \${v.mgCusto.toFixed(1)}%\n\n💰 *Acumulado Bruto:*\n📅 Hoje: \${f(brutoHoje)}\n🗓️ Mês: \${f(brutoMes)}\n\n✅ *LUCRO ACUMULADO REAL:*\n📅 Hoje: \${f(lucroHoje)}\n🗓️ Mês: \${f(lucroMes)}\`;
    enviarTelegram(msg);
  }
}

    if (!pedidoId || (dataVenda instanceof Date && dataVenda < sessentaDiasAtras)) break;
    try {
      const url = \`https://api.mercadolibre.com/orders/search?seller=\${SELLER_ID}&q=\${pedidoId}\`;
      const resp = UrlFetchApp.fetch(url, { headers: { Authorization: \`Bearer \${token}\` }, muteHttpExceptions: true });
      if (resp.getResponseCode() === 200) {
        const resultado = JSON.parse(resp.getContentText());
        if (resultado.results && resultado.results.length > 0) {
          const pedido = resultado.results[0];
          const tags = pedido.tags || [];
          if (pedido.status === "cancelled" || tags.includes("returned") || tags.includes("return_resolved") || (pedido.status === "closed" && tags.includes("reimbursement"))) {
            abaVendas.deleteRow(i + 1); removidosCount++;
          }
        }
      }
    } catch (e) {}
    Utilities.sleep(100);
  }
  if (removidosCount > 0) enviarTelegram(\`🧹 *Vigilante:* \${removidosCount} vendas removidas.\`);
}

function popularCustos() {
  const token = getAccessToken();
  const ss = SpreadsheetApp.getActiveSpreadsheet();
  const abaCustos = ss.getSheetByName("Custos");
  let offset = 0, limit = 50, todosItens = [];
  while (true) {
    const url = \`https://api.mercadolibre.com/users/\${SELLER_ID}/items/search?status=active&limit=\${limit}&offset=\${offset}\`;
    const resp = UrlFetchApp.fetch(url, { headers: { Authorization: \`Bearer \${token}\` } });
    const dados = JSON.parse(resp.getContentText());
    if (!dados.results || dados.results.length === 0) break;
    todosItens = todosItens.concat(dados.results);
    if (dados.results.length < limit) break;
    offset += limit; Utilities.sleep(300);
  }
  if (todosItens.length === 0) return;
  const dadosCustos = abaCustos.getDataRange().getValues();
  const chavesExistentes = new Set();
  for (let i = 1; i < dadosCustos.length; i++) {
    const chave = String(dadosCustos[i][0]).trim().toUpperCase();
    if (chave) chavesExistentes.add(chave);
  }
  const novasLinhas = [];
  for (let i = 0; i < todosItens.length; i += 20) {
    const ids = todosItens.slice(i, i + 20).join(",");
    try {
      const respItems = UrlFetchApp.fetch(\`https://api.mercadolibre.com/items?ids=\${ids}&attributes=id,title,seller_sku\`, { headers: { Authorization: \`Bearer \${token}\` } });
      const itens = JSON.parse(respItems.getContentText());
      for (const entry of itens) {
        if (entry.code !== 200) continue;
        const sku = String(entry.body.seller_sku || "").trim().toUpperCase();
        const titulo = String(entry.body.title || "").trim().toUpperCase();
        const chave = sku || titulo;
        if (!chave || chavesExistentes.has(chave)) continue;
        novasLinhas.push([chave, 0]); chavesExistentes.add(chave);
      }
      Utilities.sleep(300);
    } catch(e) {}
  }
  if (novasLinhas.length > 0) {
    if (abaCustos.getLastRow() <= 1) abaCustos.getRange(1,1,1,2).setValues([["SKU / PRODUTO","CUSTO"]]);
    abaCustos.getRange(abaCustos.getLastRow() + 1, 1, novasLinhas.length, 2).setValues(novasLinhas);
    enviarTelegram(\`✅ *Custos populados!*\n📦 \${novasLinhas.length} produtos adicionados.\`);
  }
}

// --- UTILITÁRIOS ---
function getAccessToken() {
  const cache = CacheService.getScriptCache();
  const tokenCached = cache.get("ml_access_token");
  if (tokenCached) return tokenCached;
  const respToken = UrlFetchApp.fetch("https://api.mercadolibre.com/oauth/token", {
    method: "post",
    payload: { grant_type: "refresh_token", client_id: CLIENT_ID, client_secret: CLIENT_SECRET, refresh_token: REFRESH_TOKEN }
  });
  const token = JSON.parse(respToken.getContentText()).access_token;
  cache.put("ml_access_token", token, 21600);
  return token;
}

function enviarTelegram(mensagem) {
  UrlFetchApp.fetch(\`https://api.telegram.org/bot\${TELEGRAM_TOKEN}/sendMessage\`, {

}

function buscarCusto(mapaCusto, sku, titulo) {
  if (sku && sku !== "SEM_SKU" && mapaCusto[sku.toUpperCase()] !== undefined) return mapaCusto[sku.toUpperCase()];
  if (titulo && mapaCusto[titulo.trim().toUpperCase()] !== undefined) return mapaCusto[titulo.trim().toUpperCase()];
  return 0;
}

function getAliquota() {
  const ss = SpreadsheetApp.getActiveSpreadsheet();
  const abaConfig = ss.getSheetByName("Config");
  return parseFloat(abaConfig.getRange("B1").getValue()) || 0;
}

function salvarAliquota(valor) {
  SpreadsheetApp.getActiveSpreadsheet().getSheetByName("Config").getRange("B1").setValue(valor);
}

function getAliquotaDecimal() { return getAliquota() / 100; }

function recalcularImpostoMes() {
  const ss = SpreadsheetApp.getActiveSpreadsheet();
  const abaVendas = ss.getSheetByName("Vendas");
  const dados = abaVendas.getDataRange().getValues();
  const aliquota = getAliquotaDecimal();
  for (let i = 1; i < dados.length; i++) {
    const preco = parseFloat(dados[i][6]) || 0, qtd = parseFloat(dados[i][5]) || 0;
    const custoUnit = parseFloat(dados[i][7]) || 0, taxaML = parseFloat(dados[i][8]) || 0, freteItem = parseFloat(dados[i][9]) || 0;
    if (preco === 0 && qtd === 0) continue;
    const imposto = (preco * qtd) * aliquota;
    const lucro = (preco * qtd) - (custoUnit * qtd) - taxaML - freteItem - imposto;
    const mgVenda = (preco * qtd) > 0 ? (lucro / (preco * qtd)) * 100 : 0;
    abaVendas.getRange(i+1,11).setValue(lucro);
    abaVendas.getRange(i+1,12).setValue(mgVenda.toFixed(1)+"%");
    abaVendas.getRange(i+1,14).setValue(imposto.toFixed(2));
  }
}

function buscarVendasBasicoPeriodo(diaInicio, diaFim) {
  const token = getAccessToken();
  const hoje = new Date(), hojeAno = hoje.getFullYear(), hojeMes = hoje.getMonth();
  const aliquota = getAliquotaDecimal();
  const inicio = new Date(hojeAno, hojeMes, diaInicio), fim = new Date(hojeAno, hojeMes, diaFim + 1);
  const fmt = d => d.toISOString().split("T")[0] + "T00:00:00.000-03:00";
  const ss = SpreadsheetApp.getActiveSpreadsheet();
  const abaVendas = ss.getSheetByName("Vendas"), abaCustos = ss.getSheetByName("Custos");
  const dadosExistentes = abaVendas.getDataRange().getValues();
  const pedidosJaRegistrados = new Set();
  for (let i = 1; i < dadosExistentes.length; i++) { let id = String(dadosExistentes[i][1]).replace(/[^0-9]/g,""); if(id) pedidosJaRegistrados.add(id); }
  const dadosCustos = abaCustos.getDataRange().getValues();
  const mapaCusto = {};
  for (let i = 1; i < dadosCustos.length; i++) { mapaCusto[String(dadosCustos[i][0]).trim().toUpperCase()] = parseFloat(String(dadosCustos[i][1]).replace(",",".")) || 0; }
  let offset = 0, limit = 50, todosPedidos = [];
  while (true) {
    const url = \`https://api.mercadolibre.com/orders/search?seller=\${SELLER_ID}&order.date_created.from=\${fmt(inicio)}&order.date_created.to=\${fmt(fim)}&order.status=paid&limit=\${limit}&offset=\${offset}\`;
    const resp = UrlFetchApp.fetch(url, { headers: { Authorization: \`Bearer \${token}\` } });
    const dados = JSON.parse(resp.getContentText());
    if (!dados.results || dados.results.length === 0) break;
    todosPedidos = todosPedidos.concat(dados.results);
    if (dados.results.length < limit) break;
    offset += limit; Utilities.sleep(300);
  }
  let novos = 0;
  for (const pedido of todosPedidos) {
    const pedidoId = String(pedido.id);
    if (pedidosJaRegistrados.has(pedidoId)) continue;
    for (const item of pedido.order_items) {
      const sku = String(item.item.seller_sku || "SEM_SKU").trim().toUpperCase(), titulo = item.item.title || "";
      const preco = item.unit_price || 0, qtd = item.quantity || 1, taxaML = item.sale_fee || 0;
      const custoUnit = buscarCusto(mapaCusto, sku, titulo), imposto = (preco * qtd) * aliquota;
      const lucro = (preco * qtd) - (custoUnit * qtd) - taxaML - imposto;
      const mgVenda = (preco * qtd) > 0 ? (lucro / (preco * qtd)) * 100 : 0;
      abaVendas.appendRow([new Date(pedido.date_created), "", "", sku, titulo, qtd, preco, custoUnit, taxaML, 0, lucro, mgVenda.toFixed(1)+"%", "", imposto.toFixed(2)]);
      const ul = abaVendas.getLastRow();
      const cell = abaVendas.getRange(ul, 2);
      cell.setFormula(\`=HYPERLINK("https://www.mercadolivre.com.br/vendas/\${pedidoId}/detalhe";"\${pedidoId}")\`);
      cell.setFontColor("#1155cc").setFontLine("underline");
      novos++;
    }
  }
  Logger.log(\`✅ Dias \${diaInicio}-\${diaFim}: \${novos} vendas\`);
  enviarTelegram(\`✅ *Vendas dias \${diaInicio}-\${diaFim}:* \${novos} inseridas!\`);
}

function completarFretePeriodo(diaInicio, diaFim) {
  const token = getAccessToken();
  const hoje = new Date(), hojeAno = hoje.getFullYear(), hojeMes = hoje.getMonth();
  const inicio = new Date(hojeAno, hojeMes, diaInicio), fim = new Date(hojeAno, hojeMes, diaFim + 1);
  const fmt = d => d.toISOString().split("T")[0] + "T00:00:00.000-03:00";
  const ss = SpreadsheetApp.getActiveSpreadsheet();
  const abaVendas = ss.getSheetByName("Vendas"), dados = abaVendas.getDataRange().getValues();
  let offset = 0, limit = 50, todosPedidos = [];
  while (true) {
    const url = \`https://api.mercadolibre.com/orders/search?seller=\${SELLER_ID}&order.date_created.from=\${fmt(inicio)}&order.date_created.to=\${fmt(fim)}&order.status=paid&limit=\${limit}&offset=\${offset}\`;
    const resp = UrlFetchApp.fetch(url, { headers: { Authorization: \`Bearer \${token}\` } });
    const res = JSON.parse(resp.getContentText());
    if (!res.results || res.results.length === 0) break;
    todosPedidos = todosPedidos.concat(res.results);
    if (res.results.length < limit) break;
    offset += limit; Utilities.sleep(300);
  }
  const mapaPedidos = {};
  todosPedidos.forEach(p => mapaPedidos[String(p.id)] = p);
  const mapaLinhas = {};
  for (let i = 1; i < dados.length; i++) { let id = String(dados[i][1]).replace(/[^0-9]/g,""); if(!id) continue; if(!mapaLinhas[id]) mapaLinhas[id]=[]; mapaLinhas[id].push(i+1); }
  let atualizados = 0;
  for (const pedidoId of Object.keys(mapaLinhas)) {
    const pedido = mapaPedidos[pedidoId];
    if (!pedido) continue;
    try {
      const totalItens = pedido.order_items.reduce((a,c) => a+c.quantity, 0);
      let tipoLogistica = "PLACES", freteCalc = 0;
      if (pedido.shipping && pedido.shipping.id) {
        const ship = JSON.parse(UrlFetchApp.fetch(\`https://api.mercadolibre.com/shipments/\${pedido.shipping.id}\`, { headers: { Authorization: \`Bearer \${token}\` } }).getContentText());
        if (ship.logistic_type === "self_service") { tipoLogistica = "FLEX"; freteCalc = pedido.order_items.some(it => it.unit_price < 79) ? -8.90 : -0.89; }
        else { freteCalc = Math.max(0, (ship.shipping_option?.list_cost||0) - (ship.shipping_option?.cost||0)); }
      }
      for (const linhaNum of mapaLinhas[pedidoId]) {
        const qtd = parseFloat(dados[linhaNum-1][5])||1, freteItem = (freteCalc/totalItens)*qtd;
        const preco = parseFloat(dados[linhaNum-1][6])||0, custoUnit = parseFloat(dados[linhaNum-1][7])||0;
        const taxaML = parseFloat(dados[linhaNum-1][8])||0, imposto = parseFloat(dados[linhaNum-1][13])||0;
        const lucro = (preco*qtd)-(custoUnit*qtd)-taxaML-freteItem-imposto;
        const mgVenda = (preco*qtd)>0?(lucro/(preco*qtd))*100:0;
        abaVendas.getRange(linhaNum,3).setValue(tipoLogistica);
        abaVendas.getRange(linhaNum,10).setValue(freteItem);
        abaVendas.getRange(linhaNum,11).setValue(lucro);
        abaVendas.getRange(linhaNum,12).setValue(mgVenda.toFixed(1)+"%");
      }
      atualizados++; Utilities.sleep(200);
    } catch(e) {}
  }
  enviarTelegram(\`✅ *Frete dias \${diaInicio}-\${diaFim}:* \${atualizados} pedidos!\`);
}

function completarDespachoPeriodo(diaInicio, diaFim) {
  const token = getAccessToken();
  const hoje = new Date(), hojeAno = hoje.getFullYear(), hojeMes = hoje.getMonth();
  const inicio = new Date(hojeAno, hojeMes, diaInicio), fim = new Date(hojeAno, hojeMes, diaFim + 1);
  const fmt = d => d.toISOString().split("T")[0] + "T00:00:00.000-03:00";
  const ss = SpreadsheetApp.getActiveSpreadsheet();
  const abaVendas = ss.getSheetByName("Vendas"), dados = abaVendas.getDataRange().getValues();
  let offset = 0, limit = 50, todosPedidos = [];
  while (true) {
    const url = \`https://api.mercadolibre.com/orders/search?seller=\${SELLER_ID}&order.date_created.from=\${fmt(inicio)}&order.date_created.to=\${fmt(fim)}&order.status=paid&limit=\${limit}&offset=\${offset}\`;
    const resp = UrlFetchApp.fetch(url, { headers: { Authorization: \`Bearer \${token}\` } });
    const res = JSON.parse(resp.getContentText());
    if (!res.results || res.results.length === 0) break;
    todosPedidos = todosPedidos.concat(res.results);
    if (res.results.length < limit) break;
    offset += limit; Utilities.sleep(300);
  }
  const mapaPedidos = {};
  todosPedidos.forEach(p => mapaPedidos[String(p.id)] = p);
  const mapaLinhas = {};
  for (let i = 1; i < dados.length; i++) { let id = String(dados[i][1]).replace(/[^0-9]/g,""); if(!id) continue; if(!mapaLinhas[id]) mapaLinhas[id]=[]; mapaLinhas[id].push(i+1); }
  let atualizados = 0;
  for (const pedidoId of Object.keys(mapaLinhas)) {
    const pedido = mapaPedidos[pedidoId];
    if (!pedido) continue;
    try {
      let dataDespachoObj = null;
      if (pedido.shipping && pedido.shipping.id) {
        const ship = JSON.parse(UrlFetchApp.fetch(\`https://api.mercadolibre.com/shipments/\${pedido.shipping.id}\`, { headers: { Authorization: \`Bearer \${token}\` } }).getContentText());
        if (ship.logistic_type === "self_service") {
          const pb = ship.shipping_option?.estimated_delivery_time?.pay_before || ship.shipping_option?.estimated_delivery_final?.date;
          if (pb) dataDespachoObj = new Date(pb);
        } else {
          const bd = ship.shipping_option?.buffering?.date || ship.shipping_option?.estimated_delivery_final?.date;
          if (bd) { dataDespachoObj = new Date(bd); dataDespachoObj.setDate(dataDespachoObj.getDate()+1); }
        }
      }
      if (dataDespachoObj) {
        for (const linhaNum of mapaLinhas[pedidoId]) abaVendas.getRange(linhaNum,13).setValue(dataDespachoObj).setNumberFormat("dd/mm/yyyy");
        atualizados++;
      }
      Utilities.sleep(200);
    } catch(e) {}
  }
  enviarTelegram(\`✅ *Despacho dias \${diaInicio}-\${diaFim}:* \${atualizados} pedidos!\`);
}

  <div id="msg-erro">❌ Erro. Tente novamente.</div>
  <div id="loading">Carregando...</div>
  <div id="conteudo" style="display:none">
    <div class="aliquota-box">
      <label>🧾 Simples Nacional:</label>
      <input type="number" id="aliquota" min="0" max="100" step="0.01" placeholder="0">
      <span>%</span>
      <button class="btn-salvar-aliquota" onclick="salvarAliq()">💾 Salvar</button>
    </div>
    <button class="btn-verde" onclick="salvar()">💾 SALVAR CUSTOS</button>
    <button class="btn-azul"  onclick="atualizar()">🔄 BUSCAR PRODUTOS NOVOS</button>
    <table><thead><tr><th>#</th><th>SKU / Produto</th><th>Custo (R$)</th></tr></thead><tbody id="tbody"></tbody></table>
    <br><button class="btn-verde" onclick="salvar()">💾 SALVAR CUSTOS</button>
  </div>
  <script>
    let dados = [];
    function carregar() {
      google.script.run.withSuccessHandler(rows => {
        dados = rows;
        const tb = document.getElementById("tbody");
        tb.innerHTML = "";
        rows.forEach((r,i) => {
          const c = r[1]||0;
          tb.innerHTML += \`<tr><td>\${i+1}</td><td class="\${c==0?'zero':'ok'}">\${r[0]}</td><td><input type="number" id="c\${i}" value="\${c}" min="0" step="0.01"></td></tr>\`;
        });
        document.getElementById("loading").style.display="none";
        document.getElementById("conteudo").style.display="block";
      }).getCustos();
      google.script.run.withSuccessHandler(v => document.getElementById("aliquota").value=v).getAliquota();
    }
    function salvar() {
      const att = dados.map((r,i) => [r[0], parseFloat(document.getElementById("c"+i).value)||0]);
      google.script.run.withSuccessHandler(()=>{ document.getElementById("msg-salvo").style.display="block"; setTimeout(()=>document.getElementById("msg-salvo").style.display="none",3000); }).salvarCustos(att);
    }
    function salvarAliq() {
      const v = parseFloat(document.getElementById("aliquota").value)||0;
      google.script.run.withSuccessHandler(()=>{ document.getElementById("msg-aliquota").style.display="block"; setTimeout(()=>document.getElementById("msg-aliquota").style.display="none",3000); }).salvarAliquota(v);
    }
    function atualizar() {
      document.getElementById("loading").style.display="block";
      document.getElementById("conteudo").style.display="none";
      google.script.run.withSuccessHandler(()=>carregar()).popularCustos();
    }
    carregar();
  <\/script>
</body>
</html>`;
}

createParticles();
</script>
</body>
</html>
